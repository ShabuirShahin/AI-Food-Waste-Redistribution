<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Excess Food</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg">

<div class="card wide">
    <h2>Post Excess Food</h2>

    <input id="food" placeholder="Food Name">
    <input id="qty" placeholder="Quantity (kg)">
    <input id="lat" placeholder="Latitude">
    <input id="lon" placeholder="Longitude">
    <input id="expiry" placeholder="Expiry (hours)">

    <button onclick="postFood()">Post Food</button>

    <p id="status"></p>
</div>

<script src="app.js"></script>
</body>
</html>
