<!DOCTYPE html>
<html>
<head>
    <title>NGO Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-4">
  <div class="card shadow p-3">
    <h4 class="text-primary text-center">📢 NGO Live Notifications</h4>
    <ul id="notifications" class="list-group mt-3"></ul>
  </div>
</div>

<script>
let socket = new WebSocket("ws://127.0.0.1:8000/ws/ngos");

socket.onmessage = (event) => {
    let li = document.createElement("li");
    li.className = "list-group-item list-group-item-info mb-2";
    li.innerText = event.data;
    document.getElementById("notifications").prepend(li);
};
</script>

</body>

</html>
